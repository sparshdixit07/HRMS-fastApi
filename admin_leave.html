<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Approval</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>

    <h2>Leave Approval</h2>

    <div>

        <button onclick="window.location.href='admin_dashboard.html'">
            Dashboard
        </button>

        <button onclick="logout()">
            Logout
        </button>

    </div>

</header>

<div class="container">

    <div class="card">

        <h3>All Leave Requests</h3>

        <table border="1" width="100%" cellpadding="8">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Employee ID</th>
                    <th>Leave Type</th>
                    <th>Start Date</th>
                    <th>End Date</th>
                    <th>Remarks</th>
                    <th>Status</th>
                    <th>Comment</th>
                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="leaveTable">

            </tbody>

        </table>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/admin_leave.js"></script>

</body>

</html>
